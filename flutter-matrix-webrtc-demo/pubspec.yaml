name: flutter_matrix_webrtc_demo
description: >-
  Reference architecture for Matrix Protocol + WebRTC communication
  in Flutter using clean architecture with GetX.

publish_to: 'none'
version: 1.0.0

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  get: ^4.6.6
  matrix: ^0.22.2
  flutter_webrtc: ^0.11.0
  firebase_messaging: ^15.1.0
  connectivity_plus: ^6.1.0
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
